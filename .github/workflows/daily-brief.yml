name: Daily Market Brief

# Runs the daily pre-market brief on GitHub's servers (no dependency on any
# personal machine). Secrets are stored as encrypted GitHub Actions secrets.
on:
  # Scheduled cron DISABLED (2026-07-08): GitHub's cron was delivering the brief
  # late / off-schedule. Delivery now runs LOCALLY & punctually via the Windows
  # scheduled tasks DriftBriefOpen (8:45am) / DriftBriefClose (3:15pm) invoking
  # scripts/daily_brief/run_brief_local.py. Re-enable the two crons below if you
  # ever want the cloud fallback again (accepting its timing slop).
  # schedule:
  #   - cron: '45 12 * * 1-5'
  #   - cron: '15 19 * * 1-5'
  workflow_dispatch: {}   # manual "Run workflow" button (cloud fallback / testing)

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps for real-data sources
        run: pip install --quiet requests

      - name: Generate the brief (Anthropic API + web search + real data)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          HYPERLIQUID_ADDRESS: ${{ secrets.HYPERLIQUID_ADDRESS }}
          SCHWAB_ACCESS_TOKEN: ${{ secrets.SCHWAB_ACCESS_TOKEN }}
        run: python scripts/daily_brief/generate_brief.py

      - name: Email the full brief
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BRIEF_EMAIL_TO: ${{ secrets.BRIEF_EMAIL_TO }}
        run: >
          python scripts/daily_brief/send_email.py
          --subject "Brief de Mercado - $(date -u +%Y-%m-%d)"
          --body-file output/brief_email.html --html

      - name: WhatsApp the key points
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python scripts/daily_brief/send_whatsapp.py --text-file output/brief_whatsapp.txt

      # If any step above failed, ping WhatsApp so a bad run is never silent.
      - name: Alert on failure
        if: failure()
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: echo "Brief de mercado FALLO hoy en GitHub Actions. Revisa los logs del repo." | python scripts/daily_brief/send_whatsapp.py
